    body {

      background: #f0f0f5;
      padding: 20px;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #310065;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #eee;
    }
    .card-info {
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      background: #310065;
      color: white;
    }
  </style>
</head>
